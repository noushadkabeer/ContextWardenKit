name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Build and Test ──────────────────────────────────
  test:
    name: Build & Test
    runs-on: macos-14  # Apple Silicon runner

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        sudo xcode-select -s \
          /Applications/Xcode_15.4.app

    - name: Show environment
      run: |
        swift --version
        xcodebuild -version
        sw_vers

    - name: Resolve dependencies
      run: swift package resolve

    - name: Build (debug)
      run: swift build -c debug

    - name: Build (release)
      run: swift build -c release

    - name: Run tests
      run: swift test --parallel

    - name: Test with sanitizers
      run: |
        swift test \
          -Xswiftc -sanitize=address \
          -Xswiftc -sanitize=thread
      continue-on-error: true
      # Informational — don't fail CI on sanitizer
      # warnings (some are expected in test environment)

  # ── Security Audit ─────────────────────────────────
  security:
    name: Security Audit
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install TruffleHog
      run: brew install trufflehog

    - name: Scan for secrets
      run: |
        trufflehog filesystem . \
          --only-verified \
          --fail

    - name: Check for private API usage
      run: |
        PRIVATE_APIS=(
          "IOHIDEvent"
          "SMCSuperIO"
          "AppleSmartBattery"
          "ANECompilerService"
          "AppleNeuralEngine"
        )
        FOUND=0
        for api in "${PRIVATE_APIS[@]}"; do
          if grep -r "$api" Sources/ \
              --include="*.swift" -l; then
            echo "Found private API: $api"
            FOUND=1
          fi
        done
        exit $FOUND

    - name: Check for non-localhost URLs
      run: |
        if grep -r "https://" Sources/ \
            --include="*.swift" | \
            grep -v "//.*https://" | \
            grep -v "apple.com" | \
            grep -v "developer.apple.com"; then
          echo "Found non-localhost URL"
          exit 1
        fi
        echo "Network check passed"

  # ── Code Quality ────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Run SwiftLint
      run: swiftlint --strict --reporter github-actions-logging

  # ── Documentation ───────────────────────────────────
  docs:
    name: Documentation Coverage
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Check public API documentation
      run: |
        # Every public declaration must have doc comments
        # This script checks for undocumented publics
        cat > /tmp/check_docs.swift << 'EOF'
        // Swift script to check documentation coverage
        // Exits 1 if undocumented public APIs found
        EOF
        # For now: use DocC to verify
        swift package generate-documentation \
          --warnings-as-errors 2>&1 | \
          grep -i "warning" && exit 1 || exit 0
      continue-on-error: true

  # ── Compatibility ───────────────────────────────────
  compatibility:
    name: macOS Compatibility
    runs-on: macos-14
    strategy:
      matrix:
        xcode: ['15.4', '16.0']

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode ${{ matrix.xcode }}
      run: |
        sudo xcode-select -s \
          /Applications/Xcode_${{ matrix.xcode }}.app
      continue-on-error: true
      # Some Xcode versions may not be available

    - name: Build
      run: swift build

    - name: Test
      run: swift test
